<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Hospital</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Verify Hospital: {{ hospital.name }}</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Name</label>
                {{ form.name }}
            </div>
            <div class="mb-3">
                <label class="form-label">Address</label>
                {{ form.address }}
            </div>
            <div class="mb-3">
                <label class="form-label">Contact</label>
                {{ form.contact }}
            </div>
            <div class="form-check">
                {{ form.is_verified }}
                <label class="form-check-label">Mark as Verified</label>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Update Verification</button>
        </form>
        <a href="{% url 'hospital_verification' %}" class="btn btn-secondary mt-3">Back to List</a>
    </div>
</body>
</html>
